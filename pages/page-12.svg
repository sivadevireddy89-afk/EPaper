<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <!-- Background -->
  <rect fill="#fafafa" width="800" height="1000"/>
  
  <!-- Newspaper Border -->
  <rect x="20" y="20" width="760" height="960" fill="#ffffff" stroke="#333" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="40" y="40" width="720" height="100" fill="#c41e3a"/>
  <text x="400" y="80" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="36" font-weight="bold">DAILY NEWS</text>
  <text x="400" y="110" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="14">Your Trusted Source Since 1920</text>
  
  <!-- Date Line -->
  <rect x="40" y="150" width="720" height="30" fill="#f0f0f0"/>
  <text x="60" y="170" fill="#333" font-family="Arial, sans-serif" font-size="12">April 1, 2026 | Wednesday | Vol. 104 No. 91</text>
  <text x="740" y="170" text-anchor="end" fill="#333" font-family="Arial, sans-serif" font-size="12">$2.00</text>
  
  <!-- Main Headline -->
  <text x="400" y="220" text-anchor="middle" fill="#1a1a1a" font-family="Georgia, serif" font-size="42" font-weight="bold">BREAKING NEWS</text>
  <text x="400" y="260" text-anchor="middle" fill="#333" font-family="Georgia, serif" font-size="24">Major Developments in Technology</text>
  <text x="400" y="290" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="16">Industry Leaders Announce New Partnership</text>
  
  <!-- Horizontal Line -->
  <line x1="40" y1="320" x2="760" y2="320" stroke="#333" stroke-width="2"/>
  
  <!-- Article Columns -->
  <!-- Left Column -->
  <rect x="40" y="340" width="340" height="200" fill="#fff"/>
  <text x="60" y="370" fill="#1a1a1a" font-family="Georgia, serif" font-size="20" font-weight="bold">Local News</text>
  <text x="60" y="400" fill="#333" font-family="Arial, sans-serif" font-size="12">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</text>
  <text x="60" y="480" fill="#333" font-family="Arial, sans-serif" font-size="12">Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</text>
  
  <!-- Right Column -->
  <rect x="420" y="340" width="340" height="200" fill="#fff"/>
  <text x="440" y="370" fill="#1a1a1a" font-family="Georgia, serif" font-size="20" font-weight="bold">Politics</text>
  <text x="440" y="400" fill="#333" font-family="Arial, sans-serif" font-size="12">Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.</text>
  <text x="440" y="480" fill="#333" font-family="Arial, sans-serif" font-size="12">Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt.</text>
  
  <!-- Image Placeholder -->
  <rect x="40" y="560" width="400" height="250" fill="#e0e0e0" stroke="#ccc"/>
  <text x="240" y="685" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="16">[News Image]</text>
  <text x="240" y="710" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="12">Photo: Daily News Archive</text>
  
  <!-- Side Stories -->
  <rect x="460" y="560" width="300" height="80" fill="#f8f8f8"/>
  <text x="470" y="590" fill="#c41e3a" font-family="Georgia, serif" font-size="16" font-weight="bold">Sports</text>
  <text x="470" y="615" fill="#333" font-family="Arial, sans-serif" font-size="12">Team wins championship in stunning victory...</text>
  
  <rect x="460" y="650" width="300" height="80" fill="#f8f8f8"/>
  <text x="470" y="680" fill="#c41e3a" font-family="Georgia, serif" font-size="16" font-weight="bold">Business</text>
  <text x="470" y="705" fill="#333" font-family="Arial, sans-serif" font-size="12">Markets rally as new economic data shows growth...</text>
  
  <!-- Bottom Section -->
  <rect x="40" y="830" width="720" height="130" fill="#f0f0f0"/>
  <text x="60" y="860" fill="#1a1a1a" font-family="Georgia, serif" font-size="18" font-weight="bold">World News Briefs</text>
  <text x="60" y="890" fill="#333" font-family="Arial, sans-serif" font-size="11">• International summit addresses climate change initiatives</text>
  <text x="60" y="910" fill="#333" font-family="Arial, sans-serif" font-size="11">• New trade agreements signed between major economies</text>
  <text x="60" y="930" fill="#333" font-family="Arial, sans-serif" font-size="11">• Cultural festival attracts thousands of visitors</text>
  <text x="60" y="950" fill="#333" font-family="Arial, sans-serif" font-size="11">• Scientific breakthrough announced in medical research</text>
  
  <!-- Page Number -->
  <text x="400" y="980" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="12">Page 1</text>
</svg>
